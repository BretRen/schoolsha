<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<title>🏫 学校杀</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { plugins: [daisyui], daisyui: { themes: ["dark"] } }
</script>
<style>
  .screen { display: none; }
  .screen:not(.hidden) { display: block; }

  /* 游戏卡牌（独立命名避免冲突） */
  .gcard {
    display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
    width:64px;height:90px;border-radius:8px;border:2px solid #374151;
    cursor:pointer;background:linear-gradient(135deg,#111827,#1f2937);
    transition:all .15s;user-select:none;position:relative;flex-shrink:0;
  }
  .gcard:hover { transform:translateY(-4px);border-color:#6b7280;box-shadow:0 4px 12px rgba(0,0,0,.4); }
  .gcard.selected { border-color:#a78bfa;box-shadow:0 0 12px rgba(167,139,250,.5);transform:translateY(-6px); }
  .gcard.disabled { opacity:.3;pointer-events:none; }
  .gcard .gsuit { font-size:18px;line-height:1; }
  .gcard .gname { font-size:12px;font-weight:600;margin:2px 0;text-align:center; }
  .gcard .gnum { font-size:11px;color:#9ca3af;position:absolute;top:4px;left:6px; }
  .gcard.heart .gsuit,.gcard.heart .gnum { color:#ef4444; }
  .gcard.diamond .gsuit,.gcard.diamond .gnum { color:#f97316; }
  .gcard.spade .gsuit,.gcard.spade .gnum { color:#9ca3af; }
  .gcard.club .gsuit,.gcard.club .gnum { color:#22c55e; }
  .gcard.heart .gname { color:#fca5a5; }
  .gcard.diamond .gname { color:#fdba74; }
  .gcard.spade .gname { color:#d1d5db; }
  .gcard.club .gname { color:#86efac; }

  /* 选角卡 */
  .chcard { background:linear-gradient(135deg,#1e1b4b,#312e81);border:2px solid #4338ca;
    border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;text-align:center;min-width:140px; }
  .chcard:hover { border-color:#818cf8;transform:translateY(-2px); }
  .chcard.selected { border-color:#c4b5fd;box-shadow:0 0 16px rgba(167,139,250,.4); }
  .chcard h3 { font-size:18px;font-weight:700;margin-bottom:4px; }
  .chcard .hp { color:#ef4444;font-size:14px; }
  .chcard .sk { color:#9ca3af;font-size:12px;margin-top:4px; }

  /* 排行榜行 */
  .lb-row { display:flex;padding:8px 16px;border-bottom:1px solid #1f2937; }
  .lb-head { display:flex;padding:8px 16px;border-bottom:1px solid #374151;color:#9ca3af;font-size:12px;font-weight:600;text-transform:uppercase; }
  .lb-rank { width:40px;text-align:center; }
  .lb-name { flex:1; }
  .lb-elo { width:80px;text-align:right;font-weight:600; }
  .lb-stats { width:80px;text-align:right;color:#9ca3af; }

  /* 游戏结束 */
  #go-title.win { color:#22c55e; }
  #go-title.lose { color:#ef4444; }

  /* 日志 */
  #game-log { max-height:120px;overflow-y:auto;font-size:12px; }
  #game-log > div { padding:2px 0;border-bottom:1px solid #1f2937; }

  /* pending */
  #pending-msg { border:1px solid #a78bfa;border-radius:8px;padding:10px 16px; }
  #pending-msg strong { color:#c4b5fd; }

  /* 固定操作栏高度 */
  #action-bar { min-height:40px; }
</style>
</head>
<body class="min-h-screen p-4">
<div id="app" class="max-w-lg mx-auto flex flex-col gap-4">

  <!-- ══════ 菜单 ══════ -->
  <div id="screen-menu" class="screen flex flex-col items-center gap-6 pt-12">
    <h1 class="text-4xl font-bold text-primary">🏫 学校杀</h1>

    <div id="auth-section" class="hidden flex items-center gap-3">
      <span id="auth-user" class="text-sm opacity-60">未登录</span>
      <button id="auth-btn" class="btn btn-outline btn-sm" onclick="startLogin()">登录</button>
    </div>

    <div class="flex flex-col gap-3 w-full max-w-xs">
      <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
      <div class="flex gap-2">
        <input id="join-code" type="text" maxlength="6" placeholder="房间码"
          class="input input-bordered w-full text-center uppercase tracking-widest text-lg font-mono">
        <button class="btn btn-outline btn-sm" onclick="joinRoom()">加入</button>
      </div>
      <button class="btn btn-outline" onclick="quickMatch()">⚡ 快速匹配</button>
      <button class="btn btn-ghost btn-sm" onclick="showLeaderboard()">🏆 排行榜</button>
    </div>

    <div id="menu-status" class="text-sm text-error"></div>
  </div>

  <!-- ══════ 大厅 ══════ -->
  <div id="screen-lobby" class="screen hidden flex flex-col items-center gap-6 pt-12">
    <h2 class="text-2xl font-bold">等待对手</h2>
    <div class="card bg-base-200 shadow-xl p-6 text-center flex flex-col gap-2 w-full">
      <div id="lobby-code" class="text-4xl font-mono font-bold text-primary tracking-widest"></div>
      <div id="lobby-invite" class="text-sm opacity-60 break-all"></div>
    </div>
    <div id="lobby-status" class="opacity-80"></div>
    <button class="btn btn-outline btn-sm" onclick="leaveLobby()">离开</button>
  </div>

  <!-- ══════ 选角 ══════ -->
  <div id="screen-char" class="screen hidden flex flex-col gap-4">
    <h2 class="text-xl font-bold text-center">选择角色</h2>
    <div id="char-timer" class="text-center text-sm text-error"></div>
    <div id="char-list" class="flex flex-wrap justify-center gap-4"></div>
    <div id="char-status" class="text-center text-sm opacity-60"></div>
  </div>

  <!-- ══════ 游戏 ══════ -->
  <div id="screen-game" class="screen hidden flex flex-col gap-3">

    <!-- 对手 -->
    <div class="card bg-base-200 shadow-lg p-4">
      <div class="flex justify-between items-center">
        <span id="opp-name" class="font-bold text-lg"></span>
        <span id="opp-hp" class="text-red-400 font-mono"></span>
      </div>
      <div class="flex justify-between text-sm opacity-60 mt-1">
        <span id="opp-cards"></span>
        <span id="opp-equip"></span>
      </div>
      <div id="opp-disconnected" class="hidden text-error text-sm mt-1">⚠ 对手已断线</div>
    </div>

    <!-- 状态栏 -->
    <div class="flex justify-between items-center text-sm bg-base-200 rounded-box p-2 px-4">
      <span id="phase-label" class="font-semibold text-primary"></span>
      <span id="turn-timer" class="font-mono text-warning"></span>
      <span id="deck-count" class="opacity-60"></span>
    </div>

    <!-- pending -->
    <div id="pending-msg" class="hidden bg-base-200"></div>

    <!-- 自己 -->
    <div class="card bg-base-200 shadow-lg p-4">
      <div class="flex justify-between items-center">
        <span id="my-name" class="font-bold text-lg"></span>
        <span id="my-hp" class="text-red-400 font-mono"></span>
      </div>
      <div id="my-equip" class="text-sm opacity-60 mt-1"></div>
    </div>

    <!-- 手牌 -->
    <div id="my-hand" class="flex gap-2 flex-wrap justify-center min-h-[96px] items-center"></div>

    <!-- 卡牌说明 -->
    <div class="text-center min-h-[24px]"><span id="card-info" class="text-sm opacity-60"></span></div>

    <!-- 操作栏（固定位置） -->
    <div id="action-bar" class="flex gap-2 flex-wrap justify-center items-center"></div>

    <!-- 日志 -->
    <div id="game-log" class="bg-base-200 rounded-box p-2 opacity-70"></div>
  </div>

  <!-- ══════ 排行榜 ══════ -->
  <div id="screen-leaderboard" class="screen hidden">
    <h2 class="text-xl font-bold text-center mb-4">🏆 排行榜</h2>
    <div id="lb-table" class="card bg-base-200"></div>
    <div id="lb-you" class="mt-2"></div>
    <button class="btn btn-outline btn-sm mt-4 w-full" onclick="showScreen('menu')">返回</button>
  </div>

  <!-- ══════ 游戏结束 ══════ -->
  <div id="game-over-overlay" class="fixed inset-0 bg-black/85 flex items-center justify-center z-[100] hidden">
    <div class="card bg-base-200 border-2 border-primary rounded-2xl p-10 text-center max-w-sm flex flex-col gap-3">
      <h2 id="go-title" class="text-3xl"></h2>
      <p id="go-subtitle" class="opacity-60"></p>
      <button class="btn btn-primary mt-4" onclick="backToMenu()">返回大厅</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
