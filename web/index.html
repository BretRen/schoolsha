<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏫 学校杀</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --c-bg: #0f0f0f; --c-card: #1a1a1a; --c-border: #2a2a2a;
    --c-text: #e0e0e0; --c-dim: #888; --c-accent: #7c3aed;
    --c-red: #ef4444; --c-green: #22c55e; --c-gold: #f59e0b;
    --card-w: 80px; --card-h: 110px;
  }
  body {
    background: var(--c-bg); color: var(--c-text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    overflow-x: hidden;
  }
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 16px; }
  .screen:not(.hidden) { display: flex; }

  .gcard {
    width: var(--card-w); height: var(--card-h);
    background: #1a1a2e; border: 2px solid #2a2a4e; border-radius: 8px;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 13px;
    text-align: center; transition: all .15s; position: relative;
    user-select: none; flex-shrink: 0;
  }
  .gcard:hover { border-color: var(--c-accent); transform: translateY(-4px); }
  .gcard.selected { border-color: var(--c-gold); transform: translateY(-8px); box-shadow: 0 4px 16px rgba(245,158,11,.3); }
  .gcard.disabled { opacity: .4; cursor: not-allowed; transform: none; border-color: #2a2a4e; }
  .gcard.facedown { background: #111; border-color: #334; color: #555; cursor: pointer; }
  .gcard.facedown:hover { border-color: var(--c-accent); color: var(--c-accent); }
  .gcard .gsuit { font-size: 20px; }
  .gcard .gname { font-weight: bold; margin: 2px 0; }
  .gcard .gnum { font-size: 11px; color: #666; position: absolute; top: 4px; right: 6px; }
  .gcard.spade { color: #e0e0e0; } .gcard.heart { color: #ef4444; }
  .gcard.club { color: #e0e0e0; } .gcard.diamond { color: #ef4444; }
  .gcard.disabled[title]:hover::after {
    content:attr(title); position:absolute; bottom:110%; left:50%; transform:translateX(-50%);
    background:#1f2937; color:#fca5a5; padding:4px 10px; border-radius:6px;
    font-size:11px; white-space:nowrap; z-index:10; border:1px solid #ef4444; pointer-events:none;
  }

  /* 动画 */
  @keyframes flash-in { 0% { opacity: 0; transform: scale(1.3); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes skill-flash { 0% { opacity: 0; transform: translateY(-8px); } 20% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes card-fade-in { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes discard-pop { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
  .animate-flash { animation: flash-in .3s ease-out; }
  .animate-skill { animation: skill-flash 3s ease-out forwards; }
  .animate-card-in { animation: card-fade-in .25s ease-out; }
  .animate-discard { animation: discard-pop .4s ease-out; }

  .chcard {
    background: var(--c-card); border: 2px solid var(--c-border);
    border-radius: 10px; padding: 16px; text-align: center; cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .chcard:hover { border-color: var(--c-accent); transform: translateY(-2px); }
  .chcard.selected { border-color: var(--c-accent); background: #1e1040; }
  .chcard h3 { font-size: 18px; margin-bottom: 4px; }
  .chcard .hp { color: var(--c-red); font-size: 14px; }
  .chcard .sk { color: var(--c-gold); font-size: 12px; margin-top: 4px; }

  .lb-row { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #222; gap: 10px; }
  .lb-rank { font-weight: bold; width: 30px; }
  .lb-name { flex: 1; } .lb-elo { color: var(--c-accent); font-weight: bold; font-family: monospace; }
  .lb-stats { color: var(--c-dim); font-size: 12px; }
  .lb-you { margin-top: 12px; padding: 10px; background: #1e1040; border-radius: 8px; border: 1px solid var(--c-accent); }
  .lb-header { color: var(--c-dim); font-size: 11px; display: flex; font-weight: bold; padding: 4px 12px; }

  #go-title.win { color: var(--c-green); } #go-title.lose { color: var(--c-red); }

  /* 全屏游戏布局 */
  #screen-game:not(.hidden) { display: flex !important; flex-direction: row !important; }
  #my-area, #opp-area { transition: background .3s; }
  #my-area { border-right: 1px solid #1e1e2e; }
  #opp-area { border-left: 1px solid #2e1e1e; }
  .turn-active { text-shadow: 0 0 18px rgba(124,58,237,.6); color: #c4b5fd !important; animation: turn-pulse 2s ease-in-out infinite; }
  @keyframes turn-pulse {
    0%, 100% { text-shadow: 0 0 12px rgba(124,58,237,.4); }
    50% { text-shadow: 0 0 28px rgba(124,58,237,.8), 0 0 40px rgba(124,58,237,.3); }
  }
  /* mini card for play/discard zones */
  .mini-card {
    width: 44px; height: 60px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0; position: relative;
  }
  .mini-card .ms { font-size: 14px; }
  .mini-card .mn { font-weight: bold; font-size: 9px; }
  .mini-card.spade,.mini-card.club { color: #ccc; } .mini-card.heart,.mini-card.diamond { color: #ef4444; }
  /* steal card fly animation */
  @keyframes steal-fly {
    0% { opacity: 0.6; transform: scale(1.2); }
    50% { opacity: 0.9; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(0.6) translateY(-40px); }
  }
  @keyframes steal-fade {
    0% { opacity: 1; }
    100% { opacity: 0; transform: scale(0.8); }
  }
  .steal-fly { animation: steal-fly .5s ease-out forwards; }
  .steal-fade { animation: steal-fade .6s ease-out forwards; }
</style>
</head>
<body>

<!-- ═══════ 菜单 ═══════ -->
<div id="screen-menu" class="screen">
  <div class="card w-full" style="background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:40px 32px;text-align:center;display:flex;flex-direction:column;gap:12px">
    <h1 class="text-4xl font-bold">🏫 学校杀</h1>
    <p class="text-sm opacity-60">1v1 卡牌对战</p>
    <div class="flex flex-col gap-3 mt-2">
      <button class="btn btn-primary w-full" onclick="createRoom()">创建房间</button>
      <div class="flex gap-2">
        <input id="join-code" type="text" maxlength="6" placeholder="房间码" class="input input-bordered flex-1 text-center uppercase tracking-[6px] text-2xl font-mono" style="background:#222;border-color:#333;color:#c4b5fd" autocomplete="off">
        <button class="btn btn-outline btn-sm shrink-0" onclick="joinRoom()">加入</button>
      </div>
      <button class="btn btn-outline w-full" onclick="quickMatch()">⚡ 快速匹配</button>
      <button class="btn btn-outline w-full" onclick="showLeaderboard()">🏆 排行榜</button>
    </div>
    <div class="flex items-center justify-center gap-3 mt-2" id="auth-section">
      <span id="auth-user" class="text-sm opacity-60">未登录</span>
      <button id="auth-btn" class="btn btn-ghost btn-xs" onclick="startLogin()">登录</button>
    </div>
    <p id="menu-status" class="text-sm opacity-60"></p>
  </div>
</div>

<!-- ═══════ 大厅 ═══════ -->
<div id="screen-lobby" class="screen hidden">
  <div class="card w-full" style="background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:40px 32px;text-align:center;display:flex;flex-direction:column;gap:12px">
    <h2 class="text-2xl font-bold">等待对手</h2>
    <div id="lobby-code" class="text-[56px] font-bold tracking-[10px] font-mono" style="color:#c4b5fd"></div>
    <p id="lobby-invite" class="text-sm break-all opacity-60"></p>
    <span class="loading loading-spinner loading-lg mx-auto"></span>
    <p id="lobby-status" class="text-sm opacity-60">等待另一位玩家...</p>
    <button class="btn btn-outline btn-sm" onclick="leaveLobby()">取消</button>
  </div>
</div>

<!-- ═══════ 选角 ═══════ -->
<div id="screen-char" class="screen hidden">
  <h2 class="text-xl font-bold text-center mb-2">选择你的角色</h2>
  <div id="char-timer" class="font-mono text-sm mb-2" style="color:var(--c-gold)"></div>
  <div id="char-list" class="grid gap-3 w-full" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))"></div>
  <p id="char-status" class="text-sm opacity-80 mt-3 text-center"></p>
</div>

<!-- ═══════ 游戏 ═══════ -->
<div id="screen-game" class="screen hidden" style="max-width:100vw;padding:0;gap:0;height:100vh;overflow:hidden;display:none">
  <!-- 左：自己面板 -->
  <div id="my-area" style="width:210px;flex-shrink:0;display:flex;flex-direction:column;padding:10px 8px;background:linear-gradient(180deg,#0f0f1a 0%,#0a0a12 100%);border-right:1px solid #1e1e2e;overflow:hidden">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      <div id="my-name" style="font-size:17px;font-weight:bold;transition:color .3s;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
      <span id="my-turn-badge" style="display:none;font-size:10px;background:var(--c-accent);color:white;padding:1px 6px;border-radius:8px;animation:turn-pulse 2s ease-in-out infinite;white-space:nowrap">你的回合</span>
      <div id="my-hp" style="font-family:monospace;font-size:14px;margin-left:auto"></div>
    </div>
    <div id="my-skills" style="font-size:11px;color:#a78bfa;min-height:16px;margin-bottom:6px;line-height:1.5"></div>
    <div id="my-equip" style="font-size:11px;color:var(--c-gold);min-height:16px;line-height:1.5"></div>
    <div style="flex:1"></div>
  </div>

  <!-- 中间：共享区 + 手牌 + 按钮 -->
  <div id="center-strip" style="flex:1;display:flex;flex-direction:column;padding:8px 12px 0;overflow:hidden;background:var(--c-bg);min-width:0">
    <!-- 顶部 bar -->
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0">
      <span id="phase-label" style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:bold;background:var(--c-accent);color:white"></span>
      <span id="turn-timer" style="font-family:monospace;font-size:13px;color:var(--c-gold)"></span>
      <span id="deck-count" style="font-size:11px;opacity:.4;margin-left:auto"></span>
    </div>
    <!-- Pending -->
    <div id="pending-msg" class="hidden" style="background:#2d0a0a;color:#fca5a5;padding:6px 10px;border-radius:6px;text-align:center;font-size:11px;margin-bottom:4px;flex-shrink:0"></div>
    <!-- Steal -->
    <div id="steal-zone" class="hidden" style="margin-bottom:4px;flex-shrink:0"></div>
    <!-- 出牌/弃牌区 -->
    <div style="display:flex;gap:12px;justify-content:center;min-height:32px;align-items:center;margin-bottom:3px;flex-shrink:0">
      <div id="play-zone" class="hidden" style="display:flex;gap:4px;align-items:center"></div>
      <div id="discard-zone" style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:center"></div>
    </div>
    <!-- 技能 flash -->
    <div id="skill-flash" class="hidden" style="text-align:center;font-size:12px;font-weight:bold;padding:4px;border-radius:6px;color:var(--c-gold);background:rgba(245,158,11,.08);margin-bottom:3px;flex-shrink:0"></div>
    <!-- 卡牌说明 -->
    <div id="card-info" style="text-align:center;font-size:12px;color:var(--c-gold);min-height:20px;flex-shrink:0"></div>
    <!-- 日志 -->
    <div id="game-log" style="flex:1;overflow-y:auto;font-size:10px;opacity:.45;min-height:40px;line-height:1.4;max-height:80px;flex-shrink:1"></div>
    <!-- 手牌 -->
    <div id="my-hand" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:flex-end;padding:4px 0;min-height:56px;flex-shrink:0"></div>
    <!-- 操作按钮 -->
    <div id="action-bar" style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:4px 0 8px;min-height:32px;align-items:center;flex-shrink:0"></div>
  </div>

  <!-- 右：对手面板 -->
  <div id="opp-area" style="width:210px;flex-shrink:0;display:flex;flex-direction:column;padding:10px 8px;background:linear-gradient(180deg,#1a0f0f 0%,#120a0a 100%);border-left:1px solid #2e1e1e;overflow:hidden">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      <div id="opp-name" style="font-size:17px;font-weight:bold;transition:color .3s;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
      <span id="opp-turn-badge" style="display:none;font-size:10px;background:#991b1b;color:#fca5a5;padding:1px 6px;border-radius:8px;animation:turn-pulse 2s ease-in-out infinite;white-space:nowrap">对手回合</span>
      <div id="opp-hp" style="font-family:monospace;font-size:14px;margin-left:auto"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
      <span id="opp-cards" style="font-size:12px;opacity:.6"></span>
      <div id="opp-disconnected" class="hidden" style="background:#991b1b;color:#fca5a5;font-size:10px;padding:1px 6px;border-radius:4px">已断线</div>
    </div>
    <div id="opp-skills" style="font-size:11px;color:#a78bfa;min-height:16px;margin-bottom:6px;line-height:1.5"></div>
    <div id="opp-equip" style="font-size:11px;color:var(--c-gold);min-height:16px;line-height:1.5"></div>
    <div style="flex:1"></div>
  </div>
</div>

<!-- ═══════ 排行榜 ═══════ -->
<div id="screen-leaderboard" class="screen hidden">
  <div class="card w-full" style="background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:40px 32px;text-align:center;display:flex;flex-direction:column;gap:12px">
    <h2 class="text-2xl font-bold">🏆 排行榜</h2>
    <div id="lb-table" class="text-left text-sm w-full"></div>
    <div id="lb-you" class="hidden"></div>
    <button class="btn btn-outline w-full" onclick="showScreen('menu')">返回</button>
  </div>
</div>

<!-- ═══════ 游戏结束 ═══════ -->
<div id="game-over-overlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden">
  <div class="text-center max-w-[360px] flex flex-col gap-3 p-10 rounded-2xl" style="background:var(--c-card);border:2px solid var(--c-accent)">
    <h2 id="go-title" class="text-3xl"></h2>
    <p id="go-subtitle" class="opacity-60 whitespace-pre-line"></p>
    <p id="go-elo" class="font-mono font-bold"></p>
    <button class="btn btn-primary" onclick="backToMenu()">返回菜单</button>
  </div>
</div>

<script src="/web/app.js"></script>
</body>
</html>
