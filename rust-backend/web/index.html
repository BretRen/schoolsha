<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>学校杀</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --c-bg: #0f0f0f;
      --c-card: #1a1a1a;
      --c-border: #2a2a2a;
      --c-text: #e0e0e0;
      --c-dim: #888;
      --c-accent: #7c3aed;
      --c-red: #ef4444;
      --c-green: #22c55e;
      --c-gold: #f59e0b;
      --card-w: 80px;
      --card-h: 110px;
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-x: hidden;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 600px;
      padding: 16px;
    }

    .gcard {
      width: var(--card-w);
      height: var(--card-h);
      background: #1a1a2e;
      border: 2px solid #2a2a4e;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      text-align: center;
      transition: all .15s;
      position: relative;
      user-select: none;
      flex-shrink: 0;
    }

    .gcard:hover {
      border-color: var(--c-accent);
      transform: translateY(-4px);
    }

    .gcard.selected {
      border-color: var(--c-gold);
      transform: translateY(-8px);
      box-shadow: 0 4px 16px rgba(245, 158, 11, .3);
    }

    .gcard.disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
      border-color: #2a2a4e;
    }

    .gcard.facedown {
      background: #111;
      border-color: #334;
      color: #555;
      cursor: pointer;
    }

    .gcard.facedown:hover {
      border-color: var(--c-accent);
      color: var(--c-accent);
    }

    .gcard .gsuit {
      font-size: 20px;
    }

    .gcard .gname {
      font-weight: bold;
      margin: 2px 0;
    }

    .gcard .gnum {
      font-size: 11px;
      color: #666;
      position: absolute;
      top: 4px;
      right: 6px;
    }

    .gcard.spade {
      color: #e0e0e0;
    }

    .gcard.heart {
      color: #ef4444;
    }

    .gcard.club {
      color: #e0e0e0;
    }

    .gcard.diamond {
      color: #ef4444;
    }

    .gcard.disabled[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #fca5a5;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
      border: 1px solid #ef4444;
      pointer-events: none;
    }

    @keyframes flash-in {
      0% {
        opacity: 0;
        transform: scale(1.3);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes skill-flash {
      0% {
        opacity: 0;
        transform: translateY(-8px);
      }

      20% {
        opacity: 1;
        transform: translateY(0);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes card-fade-in {
      0% {
        opacity: 0;
        transform: translateY(-10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
      }

      70% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes discard-pop {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.15);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes steal-fly {
      0% {
        opacity: 0.6;
        transform: scale(1.2);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.5);
      }

      100% {
        opacity: 0;
        transform: scale(0.6) translateY(-40px);
      }
    }

    @keyframes steal-fade {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: scale(0.8);
      }
    }

    @keyframes turn-pulse {

      0%,
      100% {
        text-shadow: 0 0 12px rgba(124, 58, 237, .4);
      }

      50% {
        text-shadow: 0 0 28px rgba(124, 58, 237, .8), 0 0 40px rgba(124, 58, 237,
            .3);
      }
    }

    .animate-flash {
      animation: flash-in .3s ease-out;
    }

    .animate-skill {
      animation: skill-flash 3s ease-out forwards;
    }

    .animate-card-in {
      animation: card-fade-in .25s ease-out;
    }

    .animate-discard {
      animation: discard-pop .4s ease-out;
    }

    .steal-fly {
      animation: steal-fly .5s ease-out forwards;
    }

    .steal-fade {
      animation: steal-fade .6s ease-out forwards;
    }

    .turn-active {
      text-shadow: 0 0 18px rgba(124, 58, 237, .6);
      color: #c4b5fd !important;
      animation: turn-pulse 2s ease-in-out infinite;
    }

    .chcard {
      min-width: 130px;
      background: var(--c-card);
      border: 2px solid var(--c-border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }

    .chcard:hover {
      border-color: var(--c-accent);
      transform: translateY(-2px);
    }

    .chcard.char-selected {
      border-color: var(--c-gold) !important;
      background: #1e1040;
      box-shadow: 0 0 12px rgba(245, 158, 11, .3);
    }

    .chcard.char-disabled {
      opacity: .4;
      cursor: not-allowed;
      pointer-events: none;
      transform: none !important;
    }

    .chcard h3 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .chcard .hp {
      color: var(--c-red);
      font-size: 14px;
    }

    .chcard .sk {
      color: var(--c-gold);
      font-size: 12px;
      margin-top: 4px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      gap: 10px;
    }

    .lb-rank {
      font-weight: bold;
      width: 30px;
    }

    .lb-name {
      flex: 1;
    }

    .lb-elo {
      color: var(--c-accent);
      font-weight: bold;
      font-family: monospace;
    }

    .lb-stats {
      color: var(--c-dim);
      font-size: 12px;
    }

    .lb-header {
      color: var(--c-dim);
      font-size: 11px;
      display: flex;
      font-weight: bold;
      padding: 4px 12px;
    }

    .go-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .go-card {
      background: var(--c-card);
      border: 2px solid var(--c-accent);
    }

    /* 低血量：轻微红边提示 */
    @keyframes hp-low-glow {
      0%, 100% { box-shadow: inset 0 0 15px rgba(255,0,0,.08), 0 0 0 1px rgba(255,0,0,.15); }
      50%      { box-shadow: inset 0 0 25px rgba(255,0,0,.15), 0 0 0 2px rgba(255,0,0,.25); }
    }

    #screen-game.hp-low {
      animation: hp-low-glow 3s ease-in-out infinite;
    }

    /* 濒死：强烈红光 + 红色边框 */
    @keyframes hp-glow {
      0%, 100% {
        box-shadow: inset 0 0 40px rgba(255, 0, 0, .2), 0 0 40px rgba(255, 0, 0, .12);
      }
      50% {
        box-shadow: inset 0 0 80px rgba(255, 0, 0, .45), 0 0 80px rgba(255, 0, 0, .25), 0 0 0 3px rgba(255, 0, 0, .35);
      }
    }

    #screen-game.hp-critical {
      animation: hp-glow 2s ease-in-out infinite;
    }

    /* 濒死：自己面板慢速红色闪烁 */
    @keyframes critical-panel {
      0%, 100% { box-shadow: inset 0 0 15px rgba(255,0,0,.1); }
      50%      { box-shadow: inset 0 0 35px rgba(255,0,0,.3); }
    }

    #screen-game.hp-critical #my-area {
      animation: critical-panel 2.5s ease-in-out infinite;
    }

    @keyframes time-warn {

      0%,
      100% {
        transform: translateY(0);
        opacity: .9;
      }

      50% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    #time-warning {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      pointer-events: none;
      z-index: 500;
    }

    #time-warning.show {
      animation: time-warn .8s ease-in-out infinite;
    }

    .card-fly {
      position: fixed;
      z-index: 10000;
      pointer-events: none;
      transition: left .45s cubic-bezier(.4, 0, .2, 1), top .45s cubic-bezier(.4, 0,
          .2, 1);
      transform: scale(.8);
      opacity: .9;
    }

    /* 回合切换横幅 */
    #turn-banner {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      height: 48px;
      width: 0;
      border-radius: 10px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: width .5s cubic-bezier(.4, 0, .2, 1), opacity .3s;
    }

    #turn-banner.banner-in {
      width: 60vw;
      opacity: 1;
    }

    #turn-banner.banner-out {
      width: 0;
      opacity: 0;
      transform: translateX(50vw);
      transition: width .4s ease-in, opacity .3s, transform .6s cubic-bezier(.6, 0,
          1, 1);
    }

    /* Full-screen game layout */
    #screen-game {
      display: flex;
      flex-direction: row;
      max-width: 100vw;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }

    #my-area {
      border-right: 1px solid #1e1e2e;
      transition: background .3s;
    }

    #opp-area {
      border-left: 1px solid #2e1e1e;
      transition: background .3s;
    }

    .mini-card {
      width: 44px;
      height: 60px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      position: relative;
    }

    .mini-card .ms {
      font-size: 14px;
    }

    .mini-card .mn {
      font-weight: bold;
      font-size: 9px;
    }

    .mini-card.spade,
    .mini-card.club {
      color: #ccc;
    }

    .mini-card.heart,
    .mini-card.diamond {
      color: #ef4444;
    }

    .mini-card.my-card {
      border-color: #7c3aed !important;
      background: #1a1530;
    }

    .mini-card.opp-card {
      border-color: #ef4444 !important;
      background: #301515;
    }

    /* 伤害/治疗闪烁 */
    @keyframes hp-dmg {

      0%,
      100% {
        box-shadow: inset 0 0 0 transparent;
      }

      25% {
        box-shadow: inset 0 0 50px rgba(239, 68, 68, .5);
      }
    }

    @keyframes hp-heal {

      0%,
      100% {
        box-shadow: inset 0 0 0 transparent;
      }

      25% {
        box-shadow: inset 0 0 50px rgba(34, 197, 94, .5);
      }
    }

    .hp-flash-dmg {
      animation: hp-dmg .7s ease-out;
    }

    .hp-flash-heal {
      animation: hp-heal .7s ease-out;
    }

    .gcard[data-type="effect"] {
      border-color: #f59e0b;
    }

    /* ══════════ Mobile Responsive ══════════ */
    @media (max-width: 768px) {
      /* Stack game areas vertically */
      #screen-game {
        flex-direction: column;
      }

      /* Side panels → compact horizontal bars */
      #my-area, #opp-area {
        width: 100% !important;
        flex-direction: row !important;
        padding: 4px 8px !important;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        flex-wrap: wrap;
        min-height: auto;
      }
      #my-area { border-right: none !important; border-top: 1px solid #1e1e2e; }
      #opp-area { border-left: none !important; border-bottom: 1px solid #2e1e1e; }

      /* Collapse name font */
      #my-area > div:first-child > div:first-child,
      #opp-area > div:first-child > div:first-child {
        font-size: 13px !important;
        max-width: 80px !important;
      }

      /* Hide spacer divs */
      #my-area > div[style*="flex:1"],
      #opp-area > div[style*="flex:1"] {
        display: none;
      }

      /* Hide skills list */
      #my-area > div[style*="color:#a78bfa"],
      #opp-area > div[style*="color:#a78bfa"] {
        display: none;
      }

      /* Hide equipment list */
      #my-area > div[style*="color:var(--c-gold)"],
      #opp-area > div[style*="color:var(--c-gold)"] {
        display: none;
      }

      /* Hide latency / opponent hand-count sub-row */
      #my-area > div[style*="opacity:.3"],
      #opp-area > div[style*="opacity:.6"] {
        display: none;
      }

      /* Smaller cards */
      :root {
        --card-w: 50px;
        --card-h: 68px;
      }
      .gcard .gsuit { font-size: 12px; }
      .gcard .gname { font-size: 9px; }
      .gcard .gnum { font-size: 8px; top: 2px; right: 3px; }

      /* Hand: horizontal scroll instead of wrap */
      #screen-game > div:nth-child(2) > div:last-of-type {
        flex-wrap: nowrap !important;
        overflow-x: auto;
        justify-content: flex-start !important;
        -webkit-overflow-scrolling: touch;
        gap: 4px !important;
        margin-top: auto !important;
        padding-bottom: 8px !important;
      }

      /* Touch-friendly buttons */
      .btn-sm { min-height: 36px; font-size: 12px; }

      /* Character select: stack */
      #screen-char > div {
        flex-direction: column !important;
        align-items: center !important;
        gap: 12px !important;
      }
      #screen-char > div > div:first-child {
        max-width: 100% !important;
        width: 100% !important;
      }
      #screen-char > div > div:nth-child(2) {
        width: 100% !important;
        max-width: 460px !important;
      }

      /* Menu: full-width */
      .screen { max-width: 100% !important; padding: 8px !important; }
      .screen .card { padding: 24px 16px !important; }

      /* Log: smaller */
      #screen-game > div:nth-child(2) > div[style*="overflow-y:auto"] {
        max-height: 40px !important;
        font-size: 9px !important;
      }
    }
  </style>
</head>

<body x-data>
  <!-- ═══════ 菜单 ═══════ -->
  <div id="screen-menu" class="screen" style="display:none" x-cloak x-show="$store.g.screen === 'menu'">
    <div class="card w-full"
      style="background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:40px 32px;text-align:center;display:flex;flex-direction:column;gap:12px">
      <h1 class="text-4xl font-bold">学校杀</h1>
      <p class="text-sm opacity-60">1v1 卡牌对战</p>
      <div class="flex flex-col gap-3 mt-2">
        <button class="btn btn-primary w-full" @click="createRoom()">创建房间</button>
        <div class="flex gap-2">
          <input id="join-code" type="text" maxlength="6" placeholder="房间码"
            class="input input-bordered flex-1 text-center uppercase tracking-[6px] text-2xl font-mono"
            style="background:#222;border-color:#333;color:#c4b5fd" autocomplete="off" @keydown.enter="joinRoom()">
          <button class="btn btn-outline btn-sm shrink-0" @click="joinRoom()">加入</button>
        </div>
        <button class="btn btn-outline w-full" @click="quickMatch()">⚡ 快速匹配</button>
        <button class="btn btn-outline w-full" @click="showLeaderboard()">排行榜</button>
      </div>
      <div class="flex items-center justify-center gap-2 mt-2 hidden" id="auth-section">
        <span class="text-xs opacity-50">已登录:</span>
        <span id="auth-user" class="text-sm font-medium" style="color:#c4b5fd"></span>
      </div>
    </div>
  </div>

  <!-- ═══════ 大厅 ═══════ -->
  <div id="screen-lobby" class="screen" style="display:none" x-cloak x-show="$store.g.screen === 'lobby'">
    <div class="card w-full"
      style="background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:40px 32px;text-align:center;display:flex;flex-direction:column;gap:12px">
      <h2 class="text-2xl font-bold">等待对手</h2>
      <div class="text-[56px] font-bold tracking-[10px] font-mono" style="color:#c4b5fd" x-text="$store.g.lobbyCode">
      </div>
      <p class="text-sm break-all opacity-60" x-text="$store.g.lobbyInvite"></p>
      <span class="loading loading-spinner loading-lg mx-auto"></span>
      <p class="text-sm opacity-60" x-text="$store.g.lobbyStatus"></p>
      <button class="btn btn-outline btn-sm" @click="leaveLobby()">取消</button>
    </div>
  </div>

  <!-- ═══════ 选角 ═══════ -->
  <div id="screen-char" class="screen" style="display:none" x-cloak x-show="$store.g.screen === 'char'">
    <div style="display:flex;gap:20px;width:100%;align-items:flex-start;justify-content:center">
      <!-- 左：对手信息 -->
      <div
        style="flex:1;max-width:200px;min-width:120px;background:var(--c-card);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--c-border)">
        <div class="text-xs opacity-50 mb-1">对手</div>
        <div class="font-bold text-xs mb-1" x-text="$store.g.charOpponent || '等待中'" style="word-break:break-word"></div>
        <div class="text-xs mb-2" style="line-height:1.4" x-html="$store.g.charEloPrediction"></div>
        <div x-show="$store.g.opponentPicked" class="text-xs" style="color:#f59e0b">✓ 已选择</div>
        <div x-show="$store.g.opponentLocked" class="text-xs" style="color:#22c55e">🔒 已锁定</div>
        <div x-show="!$store.g.opponentPicked" class="text-xs opacity-40">选择中...</div>
      </div>

      <!-- 中：角色选择 -->
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;width:460px">
        <h2 class="text-xl font-bold text-center mb-1">选择你的角色</h2>
        <div class="font-mono text-sm mb-2" style="color:var(--c-gold)" x-text="$store.g.charTimerText"></div>
        <div class="grid gap-3 w-full mb-3" style="grid-template-columns:repeat(3,1fr)">
          <template x-for="c in $store.g.characters" :key="c.id">
            <div class="chcard"
              :class="{'char-selected': $store.g.selectedChar === c.id, 'char-disabled': $store.g.charLocked}"
              @click="$store.g.pickCharacter(c.id)" style="transition:all .2s">
              <h3 x-text="c.name" style="font-size:15px;margin:0 0 4px"></h3>
              <div class="hp" x-text="'♥ × ' + c.maxHp" style="font-size:12px"></div>
              <div class="sk" style="font-size:11px;margin-top:4px;line-height:1.3;opacity:.7"
                x-text="c.skills.length ? c.skills.map(s => s.name).join(' · ') : '无技能'"></div>
            </div>
          </template>
        </div>
        <!-- 技能详情 -->
        <div x-show="$store.g.selectedChar"
          style="background:var(--c-card);border:1px solid var(--c-border);border-radius:8px;padding:8px 12px;width:100%;font-size:12px;margin-bottom:8px">
          <template x-for="c in $store.g.characters.filter(c=>c.id===$store.g.selectedChar)" :key="c.id">
            <div>
              <strong x-text="c.name" style="color:var(--c-accent)"></strong>
              <span style="opacity:.5"> · ♥×<span x-text="c.maxHp"></span></span>
              <div class="mt-1" style="opacity:.7;line-height:1.4">
                <template x-for="s in c.skills" :key="s.id">
                  <div>• <span x-text="s.name"></span> — <span x-text="getSkillDesc(s)"></span></div>
                </template>
                <div x-show="!c.skills.length">无技能</div>
              </div>
            </div>
          </template>
        </div>
        <!-- 锁定按钮 -->
        <button class="btn btn-primary w-full" :class="{'btn-disabled': !$store.g.selectedChar || $store.g.charLocked}"
          @click="$store.g.lockCharacter()" :disabled="!$store.g.selectedChar || $store.g.charLocked"
          style="max-width:200px">
          <span x-show="!$store.g.charLocked">锁定角色</span>
          <span x-show="$store.g.charLocked" style="color:#22c55e">✓ 已锁定</span>
        </button>
      </div>

      <!-- 右：我的信息 -->
      <div
        style="flex:1;max-width:200px;min-width:120px;background:var(--c-card);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--c-border)">
        <div class="text-xs opacity-50 mb-1">我</div>
        <div class="font-bold text-sm mb-2" x-text="$store.g.myNameDisplay()"></div>
        <div x-show="$store.g.selectedChar" class="text-xs" style="color:#f59e0b">✓ 已选择</div>
        <div x-show="$store.g.charLocked" class="text-xs" style="color:#22c55e">🔒 已锁定</div>
        <div x-show="!$store.g.selectedChar" class="text-xs opacity-40">选择中...</div>
      </div>
    </div>
  </div>

  <!-- ═══════ 游戏 ═══════ -->
  <div id="screen-game" class="screen" style="display:none" x-cloak x-show="$store.g.screen === 'game'"
    :class="{'hp-low': $store.g.me?.hp === 1 && $store.g.pending?.type !== 'near_death', 'hp-critical': $store.g.pending?.type === 'near_death' && $store.g.isMyResp}"
    x-effect="(function(){ const p=$store.g.pending; const hasP=!!p; if(p && !_prevPending) { stopTurnTimer(); if($store.g.isMyResp && p.timeout) { startPendingTimer(p.timeout); } } else if(!p && _prevPending) { stopPendingTimer(); } _prevPending=hasP; })()">
    <!-- ⏰ 时间警告 -->
    <div id="time-warning"
      :class="{'show': $store.g.isMyTurn && $store.g.gs?.phase==='play' && !$store.g.pending && $store.g.serverTimer > 0 && $store.g.serverTimer <= 10}"
      style="display:none"
      x-show="$store.g.isMyTurn && $store.g.gs?.phase==='play' && !$store.g.pending && $store.g.serverTimer > 0 && $store.g.serverTimer <= 10"
      x-text="'⏰ '+$store.g.serverTimer+'s'"></div>

    <!-- 回合切换横幅 -->
    <div id="turn-banner"></div>

    <!-- 左：自己面板 -->
    <div id="my-area"
      style="width:210px;flex-shrink:0;display:flex;flex-direction:column;padding:10px 8px;background:linear-gradient(180deg,#0f0f1a 0%,#0a0a12 100%);overflow:hidden"
      :class="{'hp-flash-dmg': $store.g._flashMy === 'dmg', 'hp-flash-heal': $store.g._flashMy === 'heal'}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <div
          style="font-size:17px;font-weight:bold;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          :class="{'turn-active': $store.g.isMyTurn}" x-text="$store.g.myNameDisplay()"></div>
        <span x-show="$store.g.isMyTurn"
          style="font-size:10px;background:var(--c-accent);color:white;padding:1px 6px;border-radius:8px;animation:turn-pulse 2s ease-in-out infinite;white-space:nowrap">你的回合</span>
        <div style="font-family:monospace;font-size:14px;margin-left:auto"
          x-text="hpStr($store.g.me?.hp,$store.g.me?.maxHp)"></div>
      </div>
      <div style="font-size:10px;opacity:.3;font-family:monospace;margin-bottom:4px" x-text="'⚡'+$store.g.latency">
      </div>

      <!-- 技能 -->
      <div style="font-size:11px;color:#a78bfa;min-height:16px;margin-bottom:6px;line-height:1.5">
        <template x-for="s in $store.g.me?.skills||[]" :key="s.id">
          <div style="margin-top:2px;cursor:help" :title="getSkillDesc(s)">
            • <span x-text="s.name"></span>
            <span style="font-size:10px;opacity:.4" x-text="s.type==='locked'?'锁定':s.type==='passive'?'被动':''"></span>
          </div>
        </template>
      </div>

      <!-- 装备 -->
      <div style="font-size:11px;color:var(--c-gold);min-height:16px;line-height:1.5">
        <template x-if="$store.g.me?.weapon">
          <div style="cursor:help" :title="getCardDesc($store.g.me.weapon)">🗡 <span
              x-text="cn($store.g.me.weapon)"></span></div>
        </template>
        <template x-if="$store.g.me?.armor">
          <div style="margin-top:4px;cursor:help" :title="getCardDesc($store.g.me.armor)">🛡 <span
              x-text="cn($store.g.me.armor)"></span></div>
        </template>
      </div>
      <div style="flex:1"></div>
    </div>

    <!-- 中间共享区 -->
    <div
      style="flex:1;display:flex;flex-direction:column;padding:8px 12px 0;overflow:hidden;background:var(--c-bg);min-width:0">
      <!-- Top bar -->
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0">
        <span
          style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:bold;background:var(--c-accent);color:white"
          x-text="$store.g.phaseLabel"></span>
        <span style="font-family:monospace;font-size:13px;color:var(--c-gold)" x-text="$store.g.turnTimerText"></span>
        <span style="font-size:11px;opacity:.4;margin-left:auto" x-text="'牌堆: ' + ($store.g.gs?.deckCount||0)"></span>
      </div>

      <!-- Pending -->
      <div x-show="$store.g.pending"
        style="background:#2d0a0a;color:#fca5a5;padding:6px 10px;border-radius:6px;text-align:center;font-size:11px;margin-bottom:4px;flex-shrink:0">
        ⚠ <strong x-text="$store.g.pendingPrefix()"></strong>需要响应：<span x-text="$store.g.pendingLabel()"></span>
        <span style="color:#f59e0b;font-weight:bold" x-text="$store.g.pendingTimerText"></span>
      </div>

      <!-- Steal zone -->
      <div x-show="$store.g.pending?.type==='steal' && $store.g.isMyResp" style="margin-bottom:4px;flex-shrink:0">
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:4px 0">
          <!-- 盲选手牌 -->
          <template x-for="pos in $store.g.stealPositions()" :key="'s'+pos">
            <div class="gcard facedown steal-card" :data-pos="pos" @click="$store.g.stealWithAnim(pos)"
              style="cursor:pointer">
              <span class="gsuit">?</span>
              <span class="gname" x-text="'第'+pos+'张'"></span>
            </div>
          </template>
          <!-- 可见装备 -->
          <template x-for="ec in ($store.g.pending?.exposedCards||[])" :key="'e'+ec.position">
            <div class="gcard steal-card" :class="ec.card.suit" :data-pos="ec.position"
              @click="$store.g.stealWithAnim(ec.position)" style="cursor:pointer">
              <span class="gsuit" x-text="suitSym(ec.card.suit)"></span>
              <span class="gname" x-text="ec.card.name"></span>
              <span class="gnum" x-text="ec.card.number"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Pick Discard zone (陷害/午饭留堂：盲选对手牌弃置) -->
      <div x-show="$store.g.pending?.type==='pick_discard' && $store.g.isMyResp"
        style="margin-bottom:4px;flex-shrink:0">
        <div style="font-size:11px;opacity:.7;text-align:center;margin-bottom:2px">盲选对手 <span
            x-text="$store.g.pickDiscardNeed()"></span> 张牌弃置：</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:4px 0">
          <!-- 盲选手牌 -->
          <template x-for="p in $store.g.pickDiscardPoolSize()" :key="'pd'+p">
            <div class="gcard facedown pick-card" :class="{'selected': $store.g.isPickSelected(p)}" :data-pos="p"
              @click="$store.g.togglePickCard(p)" style="cursor:pointer">
              <span class="gsuit">?</span>
              <span class="gname" x-text="'第'+p+'张'"></span>
            </div>
          </template>
          <!-- 可见装备 -->
          <template x-for="ec in $store.g.pickDiscardExposed()" :key="'pe'+ec.position">
            <div class="gcard pick-card" :class="ec.card.suit + ($store.g.isPickSelected(ec.position)?' selected':'')"
              :data-pos="ec.position" @click="$store.g.togglePickCard(ec.position)" style="cursor:pointer">
              <span class="gsuit" x-text="suitSym(ec.card.suit)"></span>
              <span class="gname" x-text="ec.card.name"></span>
              <span class="gnum" x-text="ec.card.number"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Play / Discard zone -->
      <div x-effect="$store.g._playVersion" id="play-discard-zone"
        style="display:flex;gap:12px;justify-content:center;min-height:36px;align-items:center;margin-bottom:3px;flex-shrink:0">
        <template x-if="$store.g.recentPlayCard()">
          <div class="mini-card animate-card-in"
            :class="($store.g.recentPlayCard()?.player === $store.g.myIndex) ? 'my-card' : 'opp-card'"
            style="font-size:13px;padding:4px 12px" :title="$store.g.cardTooltip($store.g.recentPlayCard())">
            <span class="ms" style="font-size:14px">🃏</span>
            <span class="mn" style="font-weight:bold" x-text="$store.g.recentPlayCard()?.cardName"></span>
          </div>
        </template>
        <template x-for="(d,i) in $store.g.recentDiscards()" :key="i">
          <div class="mini-card animate-discard" :class="d.player === $store.g.myIndex ? 'my-card' : 'opp-card'"
            :style="'animation-delay:'+(i*0.1)+'s'" :title="$store.g.cardTooltip(d)">
            <span class="mn" x-text="d.cardName"></span>
          </div>
        </template>
        <span x-show="$store.g.gs?.phase==='discard' && !$store.g.recentDiscards().length"
          style="font-size:11px;opacity:.4">弃牌阶段</span>
      </div>

      <!-- Skill flash -->
      <div x-show="$store.g.recentSkillUsed()"
        style="text-align:center;font-size:13px;font-weight:bold;padding:6px;border-radius:8px;color:var(--c-gold);background:rgba(245,158,11,.08);margin-bottom:4px;flex-shrink:0"
        class="animate-skill">
        ⚡ <span x-text="$store.g.recentSkillUsed()?.skillName"></span> 发动！
      </div>

      <!-- Card info -->
      <div style="text-align:center;font-size:12px;color:var(--c-gold);min-height:20px;flex-shrink:0">
        <template x-if="$store.g.cardCount > 0 && $store.g.me?.hand">
          <span x-text="getCardDesc($store.g.me.hand.find(c=>$store.g.isCardSelected(c.id))) || ''"
            x-show="$store.g.cardCount > 0 && $store.g.me?.hand?.find(c=>$store.g.isCardSelected(c.id))"></span>
          <span x-show="!$store.g.me?.hand?.find(c=>$store.g.isCardSelected(c.id))" style="opacity:.4">点击手牌选择</span>
        </template>
      </div>

      <!-- Log -->
      <div x-ref="logBox" x-effect="if($refs.logBox){$refs.logBox.scrollTop=$refs.logBox.scrollHeight}"
        style="flex:1;overflow-y:auto;font-size:10px;opacity:.45;min-height:40px;max-height:80px;line-height:1.4;flex-shrink:1">
        <template x-for="e in $store.g.gs?.log||[]" :key="e.id + Math.random()">
          <div x-text="$store.g.formatLogEntry(e)"></div>
        </template>
      </div>

      <!-- 详细一次性记录 -->
      <div style="text-align:center;font-size:11px;opacity:.7;min-height:18px;flex-shrink:0;padding:2px 0"
        x-effect="$store.g._judgeVersion" x-text="$store.g.detailLog()"></div>

      <!-- Action bar -->
      <div
        style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:4px 0 8px;min-height:32px;align-items:center;flex-shrink:0">
        <!-- 响应中：skill_discard -->
        <div x-show="$store.g.pending?.type==='skill_discard' && $store.g.isMyResp"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-primary btn-sm" x-show="$store.g.cardCount >= ($store.g.pending?.discardCount||1)"
            @click="$store.g.doConfirmSkill()">
            确认发动 (<span x-text="$store.g.cardCount"></span>/<span x-text="$store.g.pending?.discardCount||1"></span>)
          </button>
          <button class="btn btn-outline btn-sm" @click="$store.g.doPass()">取消</button>
        </div>
        <!-- 响应中：对手技能强制弃牌 -->
        <div x-show="$store.g.pending?.type==='opponent_discard' && $store.g.isMyResp"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-error btn-sm" x-show="$store.g.cardCount >= ($store.g.pending?.discardCount||1)"
            @click="$store.g.doDiscard()">
            确认弃牌 (<span x-text="$store.g.cardCount"></span>/<span x-text="$store.g.pending?.discardCount||1"></span>)
          </button>
        </div>
        <!-- 响应中：涂改液判定 -->
        <div x-show="$store.g.pending?.type==='judge_armor' && $store.g.isMyResp"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-accent btn-sm" @click="$store.g.doActivateArmor()">发动涂改液</button>
          <button class="btn btn-outline btn-sm" @click="$store.g.doPass()">不发动</button>
        </div>
        <!-- 响应中：pick_discard（陷害选牌） -->
        <div x-show="$store.g.pending?.type==='pick_discard' && $store.g.isMyResp"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-primary btn-sm" @click="$store.g.doPickDiscard()">
            确认弃牌 (<span x-text="$store.g.pickDiscardCount()"></span>/<span x-text="$store.g.pickDiscardNeed()"></span>)
          </button>
        </div>
        <!-- 响应中：普通响应 -->
        <div
          x-show="$store.g.pending && $store.g.isMyResp && $store.g.pending?.type!=='skill_discard' && $store.g.pending?.type!=='opponent_discard' && $store.g.pending?.type!=='judge_armor' && $store.g.pending?.type!=='pick_discard'"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-outline btn-sm" @click="$store.g.doPass()">不响应</button>
          <button class="btn btn-primary btn-sm" @click="$store.g.respondCard()" :disabled="$store.g.cardCount <= 0">
            出牌响应<span x-show="$store.g.cardCount <= 0" style="font-size:10px;opacity:.6">（先点击手牌选择）</span>
          </button>
        </div>
        <!-- 出牌阶段 -->
        <div x-show="$store.g.isMyTurn && $store.g.gs?.phase==='play' && !$store.g.pending"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-primary btn-sm" x-show="$store.g.cardCount > 0"
            @click="$store.g.playSelected()">出牌</button>
          <template x-for="s in ($store.g.me?.skills||[]).filter(s=>s.type==='active')" :key="s.id">
            <button class="btn btn-outline btn-sm" @click="$store.g.doUseSkill(s.id)"
              :disabled="($store.g.gs?.skillUseCount||{})[s.id] >= 1"
              :title="($store.g.gs?.skillUseCount||{})[s.id] >= 1 ? '本回合已使用过' : ''">
              技能: <span x-text="s.name"></span>
              <span x-show="($store.g.gs?.skillUseCount||{})[s.id] >= 1" style="font-size:10px;opacity:.5"> (已用)</span>
            </button>
          </template>
          <button class="btn btn-outline btn-sm" @click="$store.g.doEndPhase()">结束出牌</button>
        </div>
        <!-- 弃牌阶段 -->
        <div x-show="$store.g.isMyTurn && $store.g.gs?.phase==='discard' && !$store.g.pending"
          style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;align-items:center">
          <button class="btn btn-error btn-sm" x-show="$store.g.needDiscard() > 0 && $store.g.cardCount > 0"
            @click="$store.g.doDiscard()">
            弃牌 (<span x-text="$store.g.cardCount"></span>/<span x-text="$store.g.needDiscard()"></span>)
          </button>
          <span x-show="$store.g.needDiscard() <= 0" class="text-sm opacity-60">无需弃牌</span>
        </div>
      </div>

      <!-- Hand -->
      <div
        style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:flex-end;padding:4px 0;min-height:56px;max-height:170px;overflow-y:auto;flex-shrink:0;margin-top:100px">
        <template x-for="c in $store.g.me?.hand||[]" :key="c.id">
          <div class="gcard"
            :class="c.suit + ($store.g.isCardSelected(c.id)?' selected':'') + ($store.g.isCardDisabled(c)?' disabled':'')"
            :data-id="c.id" :title="$store.g.disabledReason(c)" @click="$store.g.toggleCard(c.id)">
            <span class="gsuit" x-text="suitSym(c.suit)"></span>
            <span class="gname" x-text="c.name"></span>
            <span class="gnum" x-text="c.number"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- 右：对手面板 -->
    <div id="opp-area"
      style="width:210px;flex-shrink:0;display:flex;flex-direction:column;padding:10px 8px;background:linear-gradient(180deg,#1a0f0f 0%,#120a0a 100%);overflow:hidden"
      :class="{'hp-flash-dmg': $store.g._flashOpp === 'dmg', 'hp-flash-heal': $store.g._flashOpp === 'heal'}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <div
          style="font-size:17px;font-weight:bold;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          :class="{'turn-active': $store.g.isOppTurn()}" x-text="$store.g.oppNameDisplay()"></div>
        <span x-show="$store.g.isOppTurn()"
          style="font-size:10px;background:#991b1b;color:#fca5a5;padding:1px 6px;border-radius:8px;animation:turn-pulse 2s ease-in-out infinite;white-space:nowrap">对手回合</span>
        <div style="font-family:monospace;font-size:14px;margin-left:auto"
          x-text="hpStr($store.g.opp?.hp,$store.g.opp?.maxHp)"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:12px;opacity:.6" x-text="'手牌: '+($store.g.opp?.handCount||0)"></span>
        <div x-show="$store.g.gs?.opponentDisconnected"
          style="background:#991b1b;color:#fca5a5;font-size:10px;padding:1px 6px;border-radius:4px">已断线</div>
      </div>

      <!-- 技能 -->
      <div style="font-size:11px;color:#a78bfa;min-height:16px;margin-bottom:6px;line-height:1.5">
        <template x-for="s in $store.g.opp?.skills||[]" :key="s.id">
          <div style="margin-top:2px;cursor:help" :title="getSkillDesc(s)">
            • <span x-text="s.name"></span>
            <span style="font-size:10px;opacity:.4" x-text="s.type==='locked'?'锁定':s.type==='passive'?'被动':''"></span>
          </div>
        </template>
      </div>

      <!-- 装备 -->
      <div style="font-size:11px;color:var(--c-gold);min-height:16px;line-height:1.5">
        <template x-if="$store.g.opp?.weapon">
          <div style="cursor:help" :title="getCardDesc($store.g.opp.weapon)">🗡 <span
              x-text="cn($store.g.opp.weapon)"></span></div>
        </template>
        <template x-if="$store.g.opp?.armor">
          <div style="margin-top:4px;cursor:help" :title="getCardDesc($store.g.opp.armor)">🛡 <span
              x-text="cn($store.g.opp.armor)"></span></div>
        </template>
      </div>
      <div style="flex:1"></div>
    </div>
  </div>

  <!-- ═══════ 排行榜 ═══════ -->
  <div id="screen-leaderboard" class="screen" style="display:none" x-cloak x-show="$store.g.screen === 'leaderboard'">
    <div class="card w-full"
      style="background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:40px 32px;text-align:center;display:flex;flex-direction:column;gap:12px">
      <h2 class="text-2xl font-bold">🏆 排行榜</h2>
      <template x-if="$store.g.lbData">
        <div class="text-left text-sm w-full">
          <div class="lb-header"><span class="lb-rank">#</span><span class="lb-name">玩家</span><span
              class="lb-elo">ELO</span><span class="lb-stats">胜/负</span></div>
          <template x-for="p in $store.g.lbData.top10" :key="p.rank">
            <div class="lb-row"><span class="lb-rank" x-text="p.rank"></span><span class="lb-name"
                x-text="p.displayName||p.userId.slice(0,8)"></span><span class="lb-elo" x-text="p.elo"></span><span
                class="lb-stats" x-text="p.wins+'W '+p.losses+'L'"></span></div>
          </template>
          <template x-if="$store.g.lbData.you">
            <div
              style="margin-top:12px;padding:10px;background:#1e1040;border-radius:8px;border:1px solid var(--c-accent)"
              class="lb-row">
              <span class="lb-rank" x-text="$store.g.lbData.you.rank"></span><span class="lb-name">← 你</span><span
                class="lb-elo" x-text="$store.g.lbData.you.elo"></span><span class="lb-stats"
                x-text="$store.g.lbData.you.wins+'W '+$store.g.lbData.you.losses+'L'"></span>
            </div>
          </template>
        </div>
      </template>
      <button class="btn btn-outline w-full" @click="$store.g.screen='menu'">返回</button>
    </div>
  </div>

  <!-- ═══════ 游戏结束 ═══════ -->
  <div x-show="$store.g.gs?.gameOver" class="go-overlay"
    style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100">
    <div class="text-center max-w-[360px] flex flex-col gap-3 p-10 rounded-2xl go-card">
      <h2 class="text-3xl" :class="$store.g.gameOverMsg().cls" x-text="$store.g.gameOverMsg().title"></h2>
      <p class="opacity-60 whitespace-pre-line">
        <span x-text="$store.g.myNameDisplay()"></span> vs <span x-text="$store.g.oppNameDisplay()"></span>
        <br>你: ♥<span x-text="$store.g.me?.hp"></span>/<span x-text="$store.g.me?.maxHp"></span>
        对手: ♥<span x-text="$store.g.opp?.hp"></span>/<span x-text="$store.g.opp?.maxHp"></span>
        <template x-if="$store.g.eloResult">
          <br><br>ELO <span :style="'color:'+($store.g.eloResult.change>0?'#22c55e':'#ef4444')+';font-weight:bold'"
            x-text="($store.g.eloResult.change>0?'+':'')+$store.g.eloResult.change"></span> → <span
            x-text="$store.g.eloResult.newElo"></span>
        </template>
      </p>
      <button class="btn btn-primary" @click="backToMenu()">返回菜单</button>
    </div>
  </div>

  <script src="/dist/const.js"></script>
  <script>
    // 回合切换横幅动画
    function showTurnBanner(isMyTurn) {
      const b = document.getElementById("turn-banner");
      if (!b) return;
      b.textContent = isMyTurn ? "你的回合" : "对手回合";
      b.style.background = isMyTurn
        ? "linear-gradient(90deg, #7c3aed, #a78bfa)"
        : "linear-gradient(90deg, #dc2626, #f87171)";
      b.classList.remove("banner-out");
      void b.offsetWidth; // reflow
      b.classList.add("banner-in");
      setTimeout(() => {
        b.classList.remove("banner-in");
        b.classList.add("banner-out");
      }, 2200);
    }
  </script>
